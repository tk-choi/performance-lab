services:
  mysql:
    image: mysql:8.0
    container_name: perflab-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: perflab
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - perflab-mysql-data:/var/lib/mysql

volumes:
  perflab-mysql-data:
